# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Inserts a blank line between shell prompts
add_newline = false

format = """
$os\
[¯é░](bg:#769ff0 fg:#a3aed2)\
$directory\
[¯é░](fg:#769ff0 bg:#394260)\
$git_branch\
$git_commit\
$git_state\
$git_status\
[¯é░](fg:#394260 bg:#212736)\
$character
"""

right_format = """
$status\
$nodejs\
$aws\
$terraform\
$time\
"""

[character]
success_symbol = '[ ´üí](bold green)'
error_symbol = "[ Ô£ù](bold red)"
vimcmd_symbol = "[ ¯Ü«](bold green)"
vimcmd_visual_symbol = "[ ¯Ü«](bold yellow)"

[directory]
style = "fg:#e3e5e5 bg:#769ff0"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "ÔÇª/"

[directory.substitutions]
"Documents" = "¾░êÖ "
"Downloads" = "´ÇÖ "
"Music" = "´Çü "
"Pictures" = "´Ç¥ "

[os]
style = "bg:#a3aed2 fg:#090c0c"
disabled = false

[os.symbols]
Macos = " ¯£æ "
Ubuntu = " ¯£║ "
Manjaro = " ¾▒ÿè "

[git_branch]
symbol = "´Éÿ"
style = "fg:#769ff0 bg:#394260"
format = '[ $symbol $branch ]($style)'

[git_commit]
style = "fg:#769ff0 bg:#394260"
tag_symbol = " ´Ç½ "
format = '[\($hash$tag\)]($style)'
tag_disabled = false

[git_state]
style = "fg:#769ff0 bg:#394260"
format = '[ \($state( $progress_current/$progress_total)\) ]($style)'

[git_status]
style = "fg:#769ff0 bg:#394260"
format = '[($all_status$ahead_behind)]($style)'

[nodejs]
symbol = "¯£ÿ"
style = "fg:#769ff0 bg:#394260"
format = '[ $symbol ($version) ]($style)'

[status]
symbol = "Ô£ù"
format = "[ $symbol $status ]($style)"
style = 'fg:red'
disabled = false

[time]
disabled = false
time_format = "%R"              # Hour:Minute Format
style = "fg:#a0a9cb bg:#394260"
format = '[ ´É║ $time ]($style)'
